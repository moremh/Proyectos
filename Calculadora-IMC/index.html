<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriFit Pro</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="logo" href="/img/Logo.png">
</head>
<body>

    <div class="card">
        <div class="top-bar">
            <button id="btn-tema" class="btn-icon">🌙</button>
            <select id="sistema-unidades" class="select-top">
                <option value="metrico">Métrico (kg, cm)</option>
                <option value="imperial">Imperial (lb, in)</option>
            </select>
        </div>

        <h2 class="app-title">NutriFit Pro</h2>

        <div class="row">
            <div class="col">
                <label>GÉNERO</label>
                <select id="genero" class="input-box">
                    <option value="f">Mujer</option>
                    <option value="m">Hombre</option>
                </select>
            </div>
            <div class="col">
                <label>EDAD (AÑOS)</label>
                <input type="number" id="edad" class="input-box" value="25" min="15" max="100">
            </div>
        </div>

        <div class="slider-group">
            <div class="flex-between">
                <label>TU PESO</label>
                <div class="valor-display">
                    <input type="number" id="peso-input" class="input-invisible" value="70">
                    <span class="unidad">kg</span>
                </div>
            </div>
            <input type="range" id="peso-rango" class="slider-teal" min="30" max="150" value="70">
        </div>

        <div class="slider-group">
            <div class="flex-between">
                <label>TU ALTURA</label>
                <div class="valor-display">
                    <input type="number" id="altura-input" class="input-invisible" value="170">
                    <span class="unidad">cm</span>
                </div>
            </div>
            <input type="range" id="altura-rango" class="slider-teal" min="120" max="220" value="170">
        </div>

        <button id="btn-calcular" class="btn-main">Calcular mi Reporte</button>

        <div id="resultado" class="oculto resultado-caja">
            <div id="avatar" class="avatar">🧍‍♀️</div>
            <h3 id="imc-numero" class="imc-num">0.0</h3>
            <p id="imc-categoria" class="imc-cat">Categoría</p>
            <p class="calorias-txt">🔥 Necesitas <strong id="calorias-numero">0</strong> kcal al día</p>
            
            <p id="tip-salud" class="tip-caja">💡 Tip: ...</p>
        </div>

        <div class="historial-seccion">
            <h4 class="historial-titulo">Tu Historial Reciente</h4>
            <ul id="lista-historial" class="lista-historial">
                </ul>
            <button id="btn-limpiar" class="btn-limpiar">LIMPIAR HISTORIAL</button>
        </div>
    </div>

    <script src="logica.js"></script>
</body>
</html>
